name: iOS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project ActionCamRemote.xcodeproj \
            -scheme ActionCamRemote \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
